name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: ${{ matrix.runtime }} ${{ matrix.runtime-version }} · ${{ matrix.mocha-suite }} · redis ${{ matrix.redis-client }} · mongo ${{ matrix.mongo-version }}/mongodb ${{ matrix.mongo-client }} · pg ${{ matrix.pg-version }}/pg ${{ matrix.pg-client }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        runtime: [node]
        runtime-version: ['20.9', '22', 'lts/*']
        redis-client: ['^4', '^5']
        mongo-version: ['8']
        mongo-client: ['^7']
        pg-version: ['18']
        pg-client: ['^8']
        # Default rows (Node × redis driver): Redis queue + Redis scheduler only.
        mocha-suite: [redis]
        include:
          # Bun runtime (jest only)
          - runtime: bun
            runtime-version: 'latest'
            redis-client: '^5'
            mongo-version: '8'
            mongo-client: '^7'
            pg-version: '18'
            pg-client: '^8'
            mocha-suite: redis
          # MongoDB server LTS coverage (mongo 7) — cross-adapter mongo + redis suites
          - runtime: node
            runtime-version: 'lts/*'
            redis-client: '^5'
            mongo-version: '7'
            mongo-client: '^7'
            pg-version: '18'
            pg-client: '^8'
            mocha-suite: mongo
          # MongoDB driver LTS coverage (mongodb ^6)
          - runtime: node
            runtime-version: 'lts/*'
            redis-client: '^5'
            mongo-version: '8'
            mongo-client: '^6'
            pg-version: '18'
            pg-client: '^8'
            mocha-suite: mongo
          - runtime: node
            runtime-version: 'lts/*'
            redis-client: '^5'
            mongo-version: '7'
            mongo-client: '^6'
            pg-version: '18'
            pg-client: '^8'
            mocha-suite: mongo
          # Postgres server LTS-and-up coverage (14–17)
          - runtime: node
            runtime-version: 'lts/*'
            redis-client: '^5'
            mongo-version: '8'
            mongo-client: '^7'
            pg-version: '14'
            pg-client: '^8'
            mocha-suite: postgres
          - runtime: node
            runtime-version: 'lts/*'
            redis-client: '^5'
            mongo-version: '8'
            mongo-client: '^7'
            pg-version: '15'
            pg-client: '^8'
            mocha-suite: postgres
          - runtime: node
            runtime-version: 'lts/*'
            redis-client: '^5'
            mongo-version: '8'
            mongo-client: '^7'
            pg-version: '16'
            pg-client: '^8'
            mocha-suite: postgres
          - runtime: node
            runtime-version: 'lts/*'
            redis-client: '^5'
            mongo-version: '8'
            mongo-client: '^7'
            pg-version: '17'
            pg-client: '^8'
            mocha-suite: postgres

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      mongo:
        image: mongo:${{ matrix.mongo-version }}
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand({ping:1})' | mongosh --quiet"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:${{ matrix.pg-version }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_URL: redis://127.0.0.1:6379
      MONGO_URL: mongodb://127.0.0.1:27017/npm-mail-time-test
      PG_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      # Canonical row: latest of everything on Node lts/*.
      # Jest (mocked) and tsc only run here; mocha is scoped per matrix.mocha-suite.
      IS_CANONICAL_ROW: ${{ matrix.runtime == 'node' && matrix.runtime-version == 'lts/*' && matrix.redis-client == '^5' && matrix.mongo-version == '8' && matrix.mongo-client == '^7' && matrix.pg-version == '18' && matrix.pg-client == '^8' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.runtime-version }}
          cache: npm

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.runtime-version }}

      - name: Install deps (npm)
        if: matrix.runtime == 'node'
        run: npm ci

      - name: Install deps (bun)
        if: matrix.runtime == 'bun'
        run: bun install --frozen-lockfile

      - name: Pin redis client to ${{ matrix.redis-client }}
        if: matrix.runtime == 'node'
        run: npm install --no-save "redis@${{ matrix.redis-client }}"

      - name: Pin redis client to ${{ matrix.redis-client }} (bun)
        if: matrix.runtime == 'bun'
        run: bun add --dev "redis@${{ matrix.redis-client }}"

      - name: Pin mongodb driver to ${{ matrix.mongo-client }}
        if: matrix.runtime == 'node'
        run: npm install --no-save "mongodb@${{ matrix.mongo-client }}"

      - name: Pin mongodb driver to ${{ matrix.mongo-client }} (bun)
        if: matrix.runtime == 'bun'
        run: bun add --dev "mongodb@${{ matrix.mongo-client }}"

      - name: Pin pg driver to ${{ matrix.pg-client }}
        if: matrix.runtime == 'node'
        run: npm install --no-save "pg@${{ matrix.pg-client }}"

      - name: Pin pg driver to ${{ matrix.pg-client }} (bun)
        if: matrix.runtime == 'bun'
        run: bun add --dev "pg@${{ matrix.pg-client }}"

      - name: Jest (node, canonical row only)
        if: matrix.runtime == 'node' && env.IS_CANONICAL_ROW == 'true'
        run: npm run test:jest

      - name: Mocha integration (node, ${{ matrix.mocha-suite }})
        if: matrix.runtime == 'node'
        run: npm run test:mocha:${{ matrix.mocha-suite }}

      - name: Mocha mongo-mongo (canonical row only)
        if: matrix.runtime == 'node' && env.IS_CANONICAL_ROW == 'true'
        run: mocha ./test/npm-mongo-mongo.js

      - name: TypeScript declarations (canonical row only)
        if: matrix.runtime == 'node' && env.IS_CANONICAL_ROW == 'true'
        run: npm run test:types

      - name: Bun-runner jest suite
        if: matrix.runtime == 'bun'
        run: bun test ./test/jest

  meteor-mongo:
    name: meteor ${{ matrix.meteor-release }} · mongo (built-in)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        meteor-release: ['3.0.4', '3.4.0']
    env:
      METEOR_TEST_SUITE: mongo
    steps:
      - uses: actions/checkout@v4

      - name: Install Meteor ${{ matrix.meteor-release }}
        run: curl "https://install.meteor.com/?release=${{ matrix.meteor-release }}" | sh

      - name: Install package deps
        run: meteor npm install --no-audit --no-fund

      - name: Meteor package tests (MongoMongo, built-in MongoDB)
        run: meteor test-packages ./ --once --driver-package meteortesting:mocha

  meteor-redis:
    name: meteor ${{ matrix.meteor-release }} · redis ${{ matrix.redis-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        meteor-release: ['3.4.0']
        redis-version: ['7-alpine', '6-alpine']
    services:
      redis:
        image: redis:${{ matrix.redis-version }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      METEOR_TEST_SUITE: redis
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4

      - name: Install Meteor ${{ matrix.meteor-release }}
        run: curl "https://install.meteor.com/?release=${{ matrix.meteor-release }}" | sh

      - name: Install package deps
        run: meteor npm install --no-audit --no-fund

      - name: Meteor package tests (MongoRedis, RedisMongo, RedisRedis)
        run: meteor test-packages ./ --once --driver-package meteortesting:mocha

  meteor-postgres:
    name: meteor ${{ matrix.meteor-release }} · postgres ${{ matrix.pg-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        meteor-release: ['3.4.0']
        pg-version: ['16', '18']
    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      METEOR_TEST_SUITE: postgres
      PG_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install Meteor ${{ matrix.meteor-release }}
        run: curl "https://install.meteor.com/?release=${{ matrix.meteor-release }}" | sh

      - name: Install package deps
        run: meteor npm install --no-audit --no-fund

      - name: Meteor package tests (PostgresPostgres)
        run: meteor test-packages ./ --once --driver-package meteortesting:mocha
